name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install orchestrator deps
        working-directory: services/orchestrator
        run: pip install -r requirements.txt pytest
      - name: Run tests
        env:
          PYTHONPATH: services/orchestrator:services/identity:services/buy-assist
        run: pytest services/orchestrator/tests services/identity/tests -q
